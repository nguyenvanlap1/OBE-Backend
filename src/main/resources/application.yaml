spring:
  devtools:
    restart:
      enabled: true
      # Quét thêm cả thư mục resources (chứa file sql init của bạn)
      additional-paths: src/main/resources
      # Nếu lưu file mà 2 giây sau chưa restart thì báo lỗi
      poll-interval: 2s
      quiet-period: 1s
  # PHẢI CÓ NHÁNH JPA Ở ĐÂY
  sql:
    init:
      mode: always
      # Sử dụng dấu * để quét toàn bộ file .sql trong thư mục init
      data-locations: classpath:sql/init/*.sql
      continue-on-error: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    # Chờ datasource sẵn sàng rồi mới tạo bảng
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  datasource:
    primary:
      jdbc-url: jdbc:mysql://localhost:3306/obe_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      url: jdbc:mysql://localhost:3306/obe_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      username: root
      password: root123
      driver-class-name: com.mysql.cj.jdbc.Driver

    camunda:
      jdbc-url: jdbc:h2:mem:camunda-db;DB_CLOSE_DELAY=-1
      url: jdbc:h2:mem:camunda-db;DB_CLOSE_DELAY=-1
      username: sa
      password: ""
      driver-class-name: org.h2.Driver

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  # Loại bỏ các package của Camunda để tránh xung đột
  packages-to-exclude: org.camunda.bpm
  # Chỉ quét chính xác nơi bạn để Controller
  packages-to-scan: com.OBE.workflow.feature

camunda:
  bpm:
    database:
      type: h2
      schema-update: true
    deployment-resource-pattern:
      - "classpath*:**/*.bpmn"
      - "classpath*:**/*.bpmn20.xml"
      - "classpath*:**/*.dmn"
      - "classpath*:**/*.dmn11.xml"
      - "classpath*:**/*.form"
    admin-user:
      id: root        # Đây là username để đăng nhập
      password: root  # Đây là password để đăng nhập
      firstName: Admin
      lastName: User
      email: admin@localhost

