version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: obe_mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: obe_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # --- PHẦN BỔ SUNG REDIS ---
  redis:
    image: redis:7.2-alpine
    container_name: obe_redis_container
    restart: always
    ports:
      - "6379:6379"
    # Lệnh dưới đây giúp Redis bảo mật hơn và giới hạn bộ nhớ (tùy chọn)
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  # --- VOLUME CHO REDIS ĐỂ KHÔNG MẤT DỮ LIỆU KHI RESTART ---
  redis_data: