services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-gpu
    ports:
      - "11434:11434"

    volumes:
      - ./ollama_data:/root/.ollama

    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    entrypoint:
      - /bin/bash
      - -c
      - |
        ollama serve &
        sleep 10
        ollama pull qwen2.5:1.5b
        
        echo "FROM qwen2.5:1.5b" > Modelfile
        echo "PARAMETER num_gpu 1" >> Modelfile
        
        ollama create qwen-gpu-fixed -f Modelfile
        
        wait